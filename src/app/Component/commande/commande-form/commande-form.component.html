<div class="page">
  <div class="card">
    <h2>{{ isEdit ? 'Modifier Commande' : 'Créer Commande' }}</h2>
    <p class="subtitle">Les champs utilisateur et validation sont gérés automatiquement</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid">
        <div class="form-group">
          <label>Nom de la commande</label>
          <input formControlName="nomCommande" type="text" />
          <small *ngIf="form.get('nomCommande')?.touched && form.get('nomCommande')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Date commande</label>
          <input formControlName="date_commande" type="date" />
          <small *ngIf="form.get('date_commande')?.touched && form.get('date_commande')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Montant</label>
          <input formControlName="montant_commande" type="number" />
          <small *ngIf="form.get('montant_commande')?.touched && form.get('montant_commande')?.invalid">Valeur invalide</small>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" type="submit" [disabled]="loading">
          {{ loading ? 'Enregistrement...' : (isEdit ? 'Mettre à jour' : 'Créer') }}
        </button>
        <button class="btn-outline" type="button" (click)="onCancel()">Annuler</button>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>
  </div>
</div>
