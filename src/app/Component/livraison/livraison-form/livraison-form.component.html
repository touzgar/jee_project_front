<div class="page">
  <div class="card">
    <h2>{{ isEdit ? 'Modifier Livraison' : 'Créer Livraison' }}</h2>
    <p class="subtitle">Tous les champs sont obligatoires</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid">
        <div class="form-group">
          <label>Date livraison</label>
          <input formControlName="date_livraison" type="date" />
          <small *ngIf="form.get('date_livraison')?.touched && form.get('date_livraison')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Coût</label>
          <input formControlName="cout" type="number" />
          <small *ngIf="form.get('cout')?.touched && form.get('cout')?.invalid">Valeur invalide</small>
        </div>

        <div class="form-group">
          <label>Statut</label>
          <select formControlName="statut">
            <option *ngFor="let s of statuses" [ngValue]="s">{{ s }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Commande</label>
          <select formControlName="commandeId">
            <option [ngValue]="null">Sélectionner une commande</option>
            <option *ngFor="let c of commandes" [ngValue]="c.id_commande">
              {{ c.nomCommande }}
            </option>
          </select>
          <small *ngIf="form.get('commandeId')?.touched && form.get('commandeId')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Transporteur</label>
          <select formControlName="transporteurId">
            <option [ngValue]="null">Sélectionner un transporteur</option>
            <option *ngFor="let t of transporteurs" [ngValue]="t.id_transporteur">
              {{ t.nom_transporteur }}
            </option>
          </select>
          <small *ngIf="form.get('transporteurId')?.touched && form.get('transporteurId')?.invalid">Champ requis</small>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" type="submit" [disabled]="loading">
          {{ loading ? 'Enregistrement...' : (isEdit ? 'Mettre à jour' : 'Créer') }}
        </button>
        <button class="btn-outline" type="button" (click)="onCancel()">Annuler</button>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>
  </div>
</div>
