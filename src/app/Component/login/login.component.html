<div class="login-page">
	<div class="login-card">
		<div class="brand">📦 FastTrack</div>
		<h1>Connexion</h1>
		<p class="subtitle">Accédez à votre espace de gestion des commandes</p>

		<form (ngSubmit)="onSubmit()" #loginForm="ngForm">
			<label for="username">Nom d'utilisateur</label>
			<input
				id="username"
				name="username"
				type="text"
				[(ngModel)]="user.username"
				placeholder="admin / user1"
				required
			/>

			<label for="password">Mot de passe</label>
			<div class="password-input-wrapper">
				<input
					id="password"
					name="password"
					[type]="showPassword ? 'text' : 'password'"
					[(ngModel)]="user.password"
					placeholder="••••••••"
					required
				/>
				<button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
					{{ showPassword ? '👁️' : '👁️‍🗨️' }}
				</button>
			</div>

			<button class="btn-primary" type="submit" [disabled]="loginForm.invalid || isLoading">
				{{ isLoading ? 'Connexion...' : 'Se connecter' }}
			</button>

			<div class="error" *ngIf="errorMessage">
				{{ errorMessage }}
			</div>
		</form>

		<div class="links">
			<a routerLink="/">← Retour à la page d'accueil</a>
		</div>
	</div>
</div>
