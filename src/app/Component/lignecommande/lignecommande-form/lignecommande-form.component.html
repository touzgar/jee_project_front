<div class="page">
  <div class="card">
    <h2>{{ isEdit ? 'Modifier Ligne' : 'Créer Ligne' }}</h2>
    <p class="subtitle">Tous les champs sont obligatoires</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid">
        <div class="form-group">
          <label>Quantité</label>
          <input formControlName="quantite" type="number" />
          <small *ngIf="form.get('quantite')?.touched && form.get('quantite')?.invalid">Valeur invalide</small>
        </div>

        <div class="form-group">
          <label>Prix unitaire</label>
          <input formControlName="prix_unitaire" type="number" />
          <small *ngIf="form.get('prix_unitaire')?.touched && form.get('prix_unitaire')?.invalid">Valeur invalide</small>
        </div>

        <div class="form-group">
          <label>Commande</label>
          <select formControlName="commandeId">
            <option [ngValue]="null">Sélectionner une commande</option>
            <option *ngFor="let c of commandes" [ngValue]="c.id_commande">
              {{ c.nomCommande }}
            </option>
          </select>
          <small *ngIf="form.get('commandeId')?.touched && form.get('commandeId')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Produit</label>
          <select formControlName="produitId">
            <option [ngValue]="null">Sélectionner un produit</option>
            <option *ngFor="let p of produits" [ngValue]="p.id_produit">
              {{ p.nom_produit }}
            </option>
          </select>
          <small *ngIf="form.get('produitId')?.touched && form.get('produitId')?.invalid">Champ requis</small>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" type="submit" [disabled]="loading">
          {{ loading ? 'Enregistrement...' : (isEdit ? 'Mettre à jour' : 'Créer') }}
        </button>
        <button class="btn-outline" type="button" (click)="onCancel()">Annuler</button>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>
  </div>
</div>
