<div class="page">
  <div class="card">
    <h2>{{ isEdit ? 'Modifier Utilisateur' : 'Créer Utilisateur' }}</h2>
    <p class="subtitle">Création de compte (ADMIN uniquement)</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid">
        <div class="form-group">
          <label>Username</label>
          <input formControlName="username" type="text" />
          <small *ngIf="form.get('username')?.touched && form.get('username')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input formControlName="password" type="password" />
          <small *ngIf="form.get('password')?.touched && form.get('password')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input formControlName="email" type="email" />
          <small *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Champ requis</small>
        </div>

        <div class="form-group">
          <label>Adresse</label>
          <input formControlName="address" type="text" />
        </div>

        <div class="form-group">
          <label>Enabled</label>
          <label class="checkbox">
            <input type="checkbox" formControlName="enabled" />
            Actif
          </label>
        </div>

        <div class="form-group">
          <label>Roles</label>
          <select formControlName="roles" multiple>
            <option *ngFor="let r of roles" [ngValue]="r">{{ r }}</option>
          </select>
          <small *ngIf="form.get('roles')?.touched && form.get('roles')?.invalid">Sélectionnez un rôle</small>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" type="submit" [disabled]="loading">
          {{ loading ? 'Enregistrement...' : 'Créer' }}
        </button>
        <button class="btn-outline" type="button" (click)="onCancel()">Annuler</button>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </form>
  </div>
</div>
